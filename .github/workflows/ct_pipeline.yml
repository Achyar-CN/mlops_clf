name: Continuous Training (CT) Pipeline

on:
  schedule:
    # Format Cron: Menit Jam Tanggal Bulan Hari
    # '0 0 1 * *' artinya berjalan SETIAP BULAN, PADA TANGGAL 1, JAM 00:00
    - cron: '0 0 1 * *'
    
  # workflow_dispatch mengizinkan Anda men-trigger pipeline ini secara manual 
  # lewat tombol "Run workflow" di halaman GitHub Actions jika tidak sabar menunggu
  workflow_dispatch: 

jobs:
  retrain-model:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Validasi Data Mentah (Great Expectations)
      env:
        PYTHONPATH: .
      run: |
        echo "Memastikan data terbaru tidak ada yang korup..."
        python src/validate.py
        
    - name: Jalankan Re-training Model (MLflow)
      env:
        PYTHONPATH: .
      run: |
        echo "Melatih ulang model menggunakan data terbaru..."
        python src/train.py
        
    - name: Laporan Selesai
      run: |
        echo "Continuous Training selesai dieksekusi!"