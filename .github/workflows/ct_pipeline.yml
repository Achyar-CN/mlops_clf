name: Continuous Training (CT) Pipeline

on:
  schedule:
    # Format Cron: Menit Jam Tanggal Bulan Hari
    # '0 0 1 * *' artinya berjalan SETIAP BULAN, PADA TANGGAL 1, JAM 00:00
    - cron: '0 0 1 * *'
    
  # workflow_dispatch mengizinkan Anda men-trigger pipeline ini secara manual 
  # lewat tombol "Run workflow" di halaman GitHub Actions jika tidak sabar menunggu
  workflow_dispatch: 

jobs:
  retrain-model:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
      
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Pull Data Asli dari Cloud (Download Dataset)
      run: |
        echo "Mengunduh dataset Titanic terbaru..."
        # Membuat folder data/raw jika belum ada
        mkdir -p data/raw
        # Mengunduh data titanic dari repositori publik sebagai simulasi S3/DVC
        wget -O data/raw/titanic.csv https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv
        echo "Data berhasil diunduh ke data/raw/titanic.csv!"
        
    - name: Validasi Data Mentah (Great Expectations)
      env:
        PYTHONPATH: .
      run: |
        echo "Menjalankan validasi data..."
        python src/validate.py
        
    - name: Jalankan Re-training Model (MLflow)
      env:
        PYTHONPATH: .
      run: |
        echo "Melatih ulang model menggunakan data yang baru diunduh..."
        python src/train.py
        
    - name: Laporan Selesai
      run: |
        echo "Continuous Training BENAR-BENAR selesai! Model baru berhasil dilatih."